<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adventure Movie 2 - ANJ Movie</title>

<style>

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #080808;
    color: white;
    font-family: Arial, Helvetica, sans-serif;
}

header {
    background: linear-gradient(135deg, #111111, #003b2f);
    padding: 20px;
    text-align: center;
    border-bottom: 2px solid #00e676;
}

.logo {
    color: #00e676;
    font-size: 28px;
    font-weight: bold;
}

.container {
    width: 95%;
    max-width: 1000px;
    margin: 25px auto;
}

.back-btn {
    display: inline-block;
    margin-bottom: 20px;
    padding: 10px 18px;
    background: #222;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    border: 1px solid #333;
}

.back-btn:hover {
    background: #00e676;
    color: black;
}

h1 {
    font-size: 26px;
    margin-bottom: 20px;
}

.video-container {
    width: 100%;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    border: 2px solid #222;
}

video {
    width: 100%;
    height: auto;
    display: block;
}

.info {
    margin-top: 20px;
    padding: 20px;
    background: #151515;
    border-radius: 10px;
}

.info h2 {
    color: #00e676;
    margin-top: 0;
}

.info p {
    color: #cccccc;
    line-height: 1.6;
}

footer {
    margin-top: 40px;
    padding: 25px;
    text-align: center;
    color: #777;
    background: #111;
}

@media (max-width: 600px) {

    h1 {
        font-size: 21px;
    }

    .logo {
        font-size: 24px;
    }

}

</style>

</head>

<body>

<header>

<div class="logo">
🎬 ANJ Movie
</div>

</header>


<div class="container">

<a href="adventure.html" class="back-btn">
← Back to Adventure
</a>

<h1>
🌿 Adventure Movie 2
</h1>


<div class="video-container">

<video
controls
playsinline
preload="metadata">

<source
src="https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFun.mp4"
type="video/mp4">

Your browser does not support HTML5 video.

</video>

</div>


<div class="info">

<h2>
Adventure Movie 2
</h2>

<p>
Welcome to ANJ Movie.
</p>

<p>
▶️ Press the Play button to start watching.
</p>

<p>
🎥 Video player supports mobile and desktop devices.
</p>

</div>

</div>


<footer>

© 2026 ANJ Movie

</footer>

</body>
</html>
