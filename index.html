<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ANJ Movie - Movie Streaming</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0b0b0f;
  color: white;
  font-family: Arial, Helvetica, sans-serif;
}

/* HEADER */
header {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: rgba(10,10,15,0.98);
  padding: 15px 5%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  border-bottom: 1px solid #222;
}

.logo {
  font-size: 28px;
  font-weight: bold;
  color: #e50914;
  white-space: nowrap;
}

.logo span {
  color: white;
}

nav {
  display: flex;
  gap: 20px;
}

nav a {
  color: white;
  text-decoration: none;
  font-size: 15px;
}

nav a:hover {
  color: #e50914;
}

.search-box {
  display: flex;
  align-items: center;
  background: #1c1c22;
  border-radius: 25px;
  padding: 8px 15px;
  width: 250px;
}

.search-box input {
  width: 100%;
  border: none;
  outline: none;
  background: transparent;
  color: white;
  font-size: 14px;
}

/* HERO */
.hero {
  min-height: 500px;
  display: flex;
  align-items: center;
  padding: 60px 6%;
  background:
    linear-gradient(
      to right,
      #0b0b0f 10%,
      rgba(11,11,15,0.75) 45%,
      rgba(11,11,15,0.3)
    ),
    url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=1600&q=80")
    center/cover;
}

.hero-content {
  max-width: 600px;
}

.hero h1 {
  font-size: 52px;
  margin-bottom: 15px;
}

.hero p {
  color: #ddd;
  line-height: 1.6;
  margin-bottom: 25px;
  font-size: 16px;
}

.hero-buttons {
  display: flex;
  gap: 12px;
}

.btn {
  display: inline-block;
  padding: 13px 25px;
  border-radius: 5px;
  text-decoration: none;
  font-weight: bold;
  cursor: pointer;
  border: none;
}

.btn-primary {
  background: #e50914;
  color: white;
}

.btn-primary:hover {
  background: #b20710;
}

.btn-secondary {
  background: rgba(255,255,255,0.2);
  color: white;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.3);
}

/* CONTENT */
.container {
  width: 90%;
  max-width: 1400px;
  margin: auto;
  padding: 40px 0;
}

.section-title {
  font-size: 25px;
  margin-bottom: 20px;
}

/* GENRES */
.genres {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;
  margin-bottom: 40px;
}

.genre {
  background: #1c1c22;
  color: white;
  border: 1px solid #333;
  padding: 12px 8px;
  border-radius: 6px;
  cursor: pointer;
  text-align: center;
  font-size: 14px;
}

.genre:hover {
  background: #e50914;
  border-color: #e50914;
}

/* MOVIE GRID */
.movie-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 20px;
}

.movie-card {
  background: #15151b;
  border-radius: 8px;
  overflow: hidden;
  transition: 0.3s;
}

.movie-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.6);
}

.movie-card img {
  width: 100%;
  height: 280px;
  object-fit: cover;
  display: block;
}

.movie-info {
  padding: 12px;
}

.movie-info h3 {
  font-size: 16px;
  margin-bottom: 7px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.movie-info p {
  color: #aaa;
  font-size: 13px;
  margin-bottom: 10px;
}

.watch-btn {
  display: block;
  text-align: center;
  background: #e50914;
  color: white;
  padding: 9px;
  border-radius: 4px;
  text-decoration: none;
  font-size: 14px;
  font-weight: bold;
}

.watch-btn:hover {
  background: #b20710;
}

/* NO RESULTS */
#noResults {
  display: none;
  color: #aaa;
  text-align: center;
  padding: 40px;
  font-size: 18px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 30px;
  margin-top: 40px;
  background: #08080b;
  color: #777;
  border-top: 1px solid #222;
}

/* TABLET */
@media (max-width: 1100px) {

  .movie-grid {
    grid-template-columns: repeat(4, 1fr);
  }

  .genres {
    grid-template-columns: repeat(4, 1fr);
  }

  .movie-card img {
    height: 260px;
  }
}

/* MOBILE */
@media (max-width: 700px) {

  header {
    flex-wrap: wrap;
    padding: 12px 4%;
  }

  .logo {
    font-size: 24px;
  }

  nav {
    order: 3;
    width: 100%;
    justify-content: center;
  }

  .search-box {
    width: 170px;
  }

  .hero {
    min-height: 450px;
    padding: 40px 5%;
  }

  .hero h1 {
    font-size: 38px;
  }

  .hero p {
    font-size: 14px;
  }

  .genres {
    grid-template-columns: repeat(2, 1fr);
  }

  .movie-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }

  .movie-card img {
    height: 230px;
  }

  .section-title {
    font-size: 22px;
  }
}

@media (max-width: 400px) {

  .movie-card img {
    height: 200px;
  }

  .search-box {
    width: 145px;
  }
}
</style>
</head>
